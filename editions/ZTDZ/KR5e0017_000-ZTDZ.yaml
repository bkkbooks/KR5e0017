body:
  text: 太上洞玄靈寳本行因縁經呉赤烏三年歳在庚申正月一日壬子仙公登勞盛山靜齋念道是日中時有地仙道士三十三人詣座燒香禮經旋行甫畢仙公命坐良乆道士於是避席請問曰下官等學道彌齡積稔于今六百甲子矣而尚散跡於山林間師尊始學道幸早被錫爲太極左仙公登玉亰入金闕禮无上虚皇不審夙因作何功德爰受天職致此巍巍三界北酆所仰願爲啓說宿命所由因縁根本也仙公曰子之所問逺乎微哉復坐吾將告爾夫一氣由虚无而生二儀由一氣而分清者爲天濁者爲地人受中氣而生與天地參爲三才𥘉无凡聖之異夀夭之殊混混沌沌不假修爲而道自居既而混沌既鑿大朴既散人事錯錯而道違矣子輩前世學道受經少作善功唯欲度身不念度人唯自求道不念人得道不信大經弘逺之辭不務齋戒不尊三洞法師好樂小乗故得地仙之道然亦出處由意去來自在長生不死但未得超凌三界遊乎十方仰瞻太上玉亰金闕耳子欲使法輪速昇飛行上清諸天者當更立功救度國土民人災厄疾苦大功德滿太上錫迎子矣是以彭祖八百歳安期生千年白石生三千齡故遊民間皆坐其前世學法小功德薄故也乃有萬餘歳在山河中猶未昇天子但數百歳何足爲乆耶夫仙人宻於山林行隂德而昇仙及尸解託形者多顯迹於世國人所稱名書經傳者少矣時仙人有姓紀字法成仙公相之曰彼即我前世弟子也其未見宿命之根耳吾能令汝見前世時事也法成曰唯唯天尊須㬰乃悟又手作禮弟子闇塞未識本行願垂愍矣仙公曰昔帝堯之世汝隨我入嵩髙山學汝志小望速毎譏吾虚誕所期遼逺所行難行復笑許由巢父絶尚箕山能辭堯禪交奢之誨亦所未安常勸法成學上清道其於不從雖飲海不得滿腹徒叩石不獲玉巢許早昇太極宫吾今又方登左仙公之任汝獨爲地仙但不死而巳其德交幾階子豈不悒悒乎於今乃知我言之有徴信而不欺矣法成慙恱憶此未乆心中了然昔不奉教此難可得願見㧞度侍給雲車執御親封天顔故是弟子宿縁之㑹矣仙公曰汝超卓髙舉裁可昇天而巳那得隨我之太極宫朝太上玉亰金闕乎吾无所惜矣仙人又請問仙公曰宿世本行爲盡是耶未竟者願教之仙公曰我先世經歴施行罪福輪轉化形經天說之亦當不盡子欲知之爲可略舉一隅耳吾昔嘗生爲貴人而凌貧賤抉彊抑弱死入地獄後生爲小人貧窮陋疾孤寒煢然時乃發念我宿命何行而致此辛苦彼宿命何德而享其富貴思念作善然心不自解憂毒難言死昇福堂後生富家珍寳内足无有所乏而苦酷奴婢死入地獄徒考三官罪竟後生爲下使視人氣息伏事自效動得鞭笞勤苦塗炭靡所不履時乃發念先世何辜當作此下使耶而以私産供給貧人敬仰道士上香奉油帷願生貴家死昇福堂衣食自然後生爲貴人乃復殺害衆生漁獵爲事死入地獄經履刀山劒樹湯煑吞火五苦備至罪竟後生爲猪羊以報昔怨後受形爲下賤人𦤀惡可憎之極欺取人財而不還死入地獄後生爲牛以力償人以肉飴人後受形作中人珍寳近足是時乃念作功德常供養道士奉經承戒謙謙下人布施厄困毎事從道聞善欲從年八十乃死逕昇福舍衣食天㕑後生貴家乃習好武勇殺伐爲事然故敬順道士信向正法死入地獄當經考毒時太上有教此人雖犯殺伐而巳經入地獄在世信法敬道布施厄困今原其考罰可令昇福堂給以天㕑後生爲貴人怨對將至是時發願念道敬受經教施行隂德拯濟危急政事以道慈心於物供養道士奉君以忠使臣以禮𢘆念辭榮棄禄乃免怨家夀終昇天堂生復爲貴人敬信尤精而少之時乃發念燒香願我後生智慧精明玄解妙義死昇福堂後生中士家遂爲道士被服法衣而行道時經講聦明動爲法師衆人所推檀越所敬時乃發念云此一生不能得道而不如女人愔寂无事可致閑樂命終即生爲女人姿容端正才思玄㧞發言成章時乃修齋讀經於是發念爲男子才略宏落通玄徹虚洞解希微而願爲國王與道士周旋在意所願遊看山水妓樂内足常有經講命過昇天堂衣食自然㝷生國王家爲太子從容儲宫承統王業時快引道士賢儒學人行禮講道修齋寂靜肆意所尚國安民豐肅然无事是時三侍臣同發願後生作道士我爲隱士釋道微竺法蘭願爲沙門鄭思逺張泰爲道士普志昇仙度世絶王務死逕昇天堂衣食天㕑我後生爲隱士蘭微爲沙門張鄭爲道士俱入學道求仙吾後爲諸人作師志大乗行常齋誡讀經並齎珍寳詣大法師受三洞大經供養禮願齋誡行道服食吐納因縁未盡命過太隂即生賢家復爲道士沙門復得同學相爲師徒復受大經齋戒行道是故上聖盻目覷眞降教於我也爾時蘭微張鄭盡侍座今日相隨是宿世之縁願故爾諸仙莫不釋然四座咨嗟乃嘆曰天尊上人求道積乆彌劫歴稔故以得仙公之位諒有由矣我等今盡見宿世所行功薄受經少那責求髙仙乎於此當念更受大洞經慕道勤行慈心度諸困厄以冀昇天之道矣仙公曰子不尊上道洞經衆妙元理各自念勤大作功德度諸苦厄如是之志何憂不速昇天乎但便欲登太上金闕猶當未有日耳仙公曰我无所不履非筆札所載勤苦難說矣始蒙今報也仙人問曰前與上人俱入洞庭看天王别宫初登苞山時見有一軰仙人求隨上人看戯盡何等仙人乃多如此答曰彼仙人皆是諸名山洞臺仙人其巳不多子不見崐崘蓬萊鍾山嵩髙須彌人鳥諸大山洞室仙人无數矣仙人曰不知洞庭通何處答曰乃通此上諸大山及巨海北酆岱宗五嶽无所不通矣有五仙人言歸句曲山彼上人郷里乎答曰句曲山乃吾舉眼所見亦江左之佳山是九泉洞庭西掖門其下洞臺方四十里宫室煥日乃三十六小天之數也不受穢炁道士正可棲庇之耳常有聖人昔茅先生得道今故在彼山洞宫山上虚中名爲空洞立玄宫觀舍仙人也仙人請問曰近登崐崘玄圃宫侍座見正一眞人三天法師張道陵降座酆都伺迎三界稽首諸天禮問動靜龍駕曜虚頂負圎明身生天光文章煥爛先世何功德故是得道其獨如是乎願聞之答曰天師本行所歴亦彌劫勤苦齋戒讀經弘道大度髙範玄眞耽味希微轉輪求道尤過於吾不可具其志大經行大道故得三天法師之任太上正一眞人之號矣豈不大乎時東華青童子衆仙盡嵩髙洞中靜齋詠經如學之者聞仙公說諸本行莫不思念大法以自篤勵青童曰仙公妙唱辭逺事要信而可尊者也衆仙作禮而曰請事斯語矣青童曰吾前與卿書獲報承眷至𢘆不暫忘足下受太上錫吾乃應先有修敬情好相親未即展某毎爲反側願不負此懷也仙公曰前辱卿書慰眷殊過深爲踧踖益用虚佇情何巳巳乎不以短乏德忝上聖顯徴書命赫奕愧所不勝相與道德周旋三界毎念逍遥同遊敬虚斯情可言公家之敬奚復及也但尋登上任違逺日近逆有戀恨如何青童答曰銜顧至願數有恩慰耳仙公曰天師言月旦十五日能齋於靜室讀所受道經及諸仙道迹者皆當爲後聖之民生值斯世豈不樂乎丁卯日禮東華青童君於靖中北向三拜求所願神仙之事又本命日讀經不交人事皆是求仙之要言也道家此事亦多矣適人所奉者也大歸訣在丹情行玄教有願无不剋也太上洞玄靈寳本行因縁經
